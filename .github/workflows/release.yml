name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 探测可选 secrets 是否配置，输出开关给后续 job。
  # （secrets 不能直接用于 job 级 if，需经此 job 转成 outputs）
  check:
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.detect.outputs.ios }}
      android_signed: ${{ steps.detect.outputs.android_signed }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      notes: ${{ steps.release.outputs.notes }}
    steps:
      - uses: actions/checkout@v5

      - id: detect
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$IOS_CERTIFICATE" ]; then
            echo "ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "ios=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "android_signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "android_signed=false" >> "$GITHUB_OUTPUT"
          fi

      # 统一解析 tag / version / notes：tag 推送用 ref_name；手动 workflow_dispatch
      # 从 package.json 读版本构造 v<版本>。CHANGELOG 只在此解析一次，供后续所有 job 复用。
      - id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          BODY=$(awk -v v="$VERSION" '
            $1 == "##" && $2 == v { capture=1; next }
            capture && $1 == "##" { exit }
            capture { print }
          ' CHANGELOG.md)
          [ -z "$BODY" ] && BODY="Release $VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  # 桌面五目标（参照 sbox），直接创建公开 release。
  desktop:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
          - platform: windows-latest
            args: ''
            rust-target: ''
          - platform: windows-latest
            args: '--target aarch64-pc-windows-msvc'
            rust-target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-${{ matrix.rust-target || 'default' }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-${{ matrix.rust-target || 'default' }}-cargo-
            ${{ matrix.platform }}-cargo-

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'STerm v__VERSION__'
          releaseBody: ${{ needs.check.outputs.notes }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  # Android：gen/android 已随仓库提交（含定制签名的 build.gradle.kts），
  # CI 解码 keystore → 经环境变量传签名 → build APK → 上传到 release。
  android:
    needs: [check, desktop]
    if: ${{ !cancelled() && needs.desktop.result == 'success' && needs.check.outputs.android_signed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.11902837"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.11902837" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            android-cargo-

      - run: pnpm install --frozen-lockfile

      # 解码 keystore 到临时目录，路径经 ANDROID_KEYSTORE_PATH 传给 build.gradle.kts。
      # 仓库内 secrets/keystore.properties 未随 CI 检出（已 .gitignore），gradle 自动回退到环境变量。
      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build APK
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: pnpm tauri android build --apk

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          # 排除 release 未签名产物（app-*-release-unsigned.apk）：job 已守卫签名齐备，
          # 正常只会有一个已签名的 universal release APK。
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' ! -name '*unsigned*' | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::未找到已签名的 APK（仅有未签名产物？请检查签名配置）"
            exit 1
          fi
          DEST="STerm_${TAG#v}_android.apk"
          cp "$APK" "$DEST"
          gh release upload "$TAG" "$DEST" -R "${{ github.repository }}" --clobber

  # iOS：仅在配置了签名 secrets 时运行（由 check job 决定）。
  ios:
    needs: [check, desktop]
    if: ${{ !cancelled() && needs.desktop.result == 'success' && needs.check.outputs.ios == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ios-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ios-cargo-

      - run: pnpm install --frozen-lockfile

      - name: Init iOS project
        run: pnpm tauri ios init

      - name: Build iOS app
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: pnpm tauri ios build --export-method ad-hoc

      - name: Upload IPA to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          IPA=$(find src-tauri/gen/apple/build -name '*.ipa' | head -n1)
          if [ -z "$IPA" ]; then
            echo "::error::未找到构建出的 IPA"
            exit 1
          fi
          DEST="STerm_${TAG#v}_ios.ipa"
          cp "$IPA" "$DEST"
          gh release upload "$TAG" "$DEST" -R "${{ github.repository }}" --clobber

  # 把桌面构建生成的 latest.json 同步到固定的 "updater" release，
  # 即 tauri.conf.json 中 updater endpoint 指向的地址。
  publish-manifest:
    needs: [check, desktop]
    if: ${{ !cancelled() && needs.desktop.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Force release body from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.check.outputs.tag }}
          RELEASE_NOTES: ${{ needs.check.outputs.notes }}
        shell: bash
        run: |
          # tauri-action 只在首次创建 release 时写 body；若已被某个 matrix run 创建，
          # body 会停留在旧值，这里用统一解析出的 notes 强制刷新。
          gh release edit "$TAG" -R "$REPO" --notes "$RELEASE_NOTES"

      # 给桌面产物文件名加系统和架构标识（tauri-action 上传时不含）。
      # 此 job needs: desktop，所有桌面 matrix 已完成，不会再有旧名文件上传；
      # 与并行的 android/ios 操作的是不同文件，互不冲突。
      # sed 不加 $ 行尾锚，.sig 后缀会自动随前缀一起重命名。
      - name: Rename desktop assets with OS tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.check.outputs.tag }}
          ASSET_VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh api "/repos/$REPO/releases/tags/$TAG" --jq '.assets[] | "\(.id)\t\(.name)"' |
          while IFS=$'\t' read -r id name; do
            new=$(printf '%s' "$name" | sed -E \
              -e "s#^STerm_[0-9][0-9.]*_aarch64\.dmg#STerm_${ASSET_VERSION}_macos_arm64.dmg#" \
              -e "s#^STerm_[0-9][0-9.]*_x64\.dmg#STerm_${ASSET_VERSION}_macos_x64.dmg#" \
              -e "s#^STerm_aarch64\.app\.tar\.gz#STerm_${ASSET_VERSION}_macos_arm64.app.tar.gz#" \
              -e "s#^STerm_x64\.app\.tar\.gz#STerm_${ASSET_VERSION}_macos_x64.app.tar.gz#" \
              -e "s#^STerm_[0-9][0-9.]*_amd64\.(AppImage|deb)#STerm_${ASSET_VERSION}_linux_x64.\1#" \
              -e "s#^STerm_[0-9][0-9.]*_x64-setup\.nsis\.zip#STerm_${ASSET_VERSION}_windows_x64.nsis.zip#" \
              -e "s#^STerm_[0-9][0-9.]*_arm64-setup\.nsis\.zip#STerm_${ASSET_VERSION}_windows_arm64.nsis.zip#" \
              -e "s#^STerm_[0-9][0-9.]*_x64-setup\.exe#STerm_${ASSET_VERSION}_windows_x64.exe#" \
              -e "s#^STerm_[0-9][0-9.]*_arm64-setup\.exe#STerm_${ASSET_VERSION}_windows_arm64.exe#")
            if [ "$new" != "$name" ]; then
              echo "rename: $name -> $new"
              gh api -X PATCH "/repos/$REPO/releases/assets/$id" -f name="$new" >/dev/null
            fi
          done

      - name: Generate updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.check.outputs.tag }}
          ASSET_VERSION: ${{ needs.check.outputs.version }}
          RELEASE_NOTES: ${{ needs.check.outputs.notes }}
        run: |
          set -euo pipefail
          gh api "/repos/$REPO/releases/tags/$TAG" > release.json
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');

          const repo = process.env.REPO;
          const version = process.env.ASSET_VERSION;
          const release = JSON.parse(fs.readFileSync('release.json', 'utf8'));
          const assets = new Map(release.assets.map((asset) => [asset.name, asset]));
          const platforms = {};
          const missing = [];

          function signatureFor(assetName) {
            const sigName = `${assetName}.sig`;
            const sigAsset = assets.get(sigName);
            if (!sigAsset) {
              throw new Error(`missing signature asset: ${sigName}`);
            }
            return execFileSync('gh', [
              'api',
              `/repos/${repo}/releases/assets/${sigAsset.id}`,
              '-H',
              'Accept: application/octet-stream',
            ], { encoding: 'utf8' }).trim();
          }

          function add(keys, candidates) {
            const asset = candidates.map((name) => assets.get(name)).find(Boolean);
            if (!asset) {
              missing.push(candidates.join(' or '));
              return;
            }
            const entry = {
              signature: signatureFor(asset.name),
              url: asset.browser_download_url,
            };
            for (const key of keys) {
              platforms[key] = entry;
            }
          }

          add(['darwin-x86_64', 'darwin-x86_64-app'], [
            `STerm_${version}_macos_x64.app.tar.gz`,
          ]);
          add(['darwin-aarch64', 'darwin-aarch64-app'], [
            `STerm_${version}_macos_arm64.app.tar.gz`,
          ]);
          add(['windows-x86_64', 'windows-x86_64-nsis'], [
            `STerm_${version}_windows_x64.nsis.zip`,
            `STerm_${version}_windows_x64.exe`,
          ]);
          add(['windows-aarch64', 'windows-aarch64-nsis'], [
            `STerm_${version}_windows_arm64.nsis.zip`,
            `STerm_${version}_windows_arm64.exe`,
          ]);
          add(['linux-x86_64', 'linux-x86_64-appimage'], [
            `STerm_${version}_linux_x64.AppImage.tar.gz`,
            `STerm_${version}_linux_x64.AppImage`,
          ]);

          if (missing.length > 0) {
            throw new Error(`missing updater payload asset(s): ${missing.join(', ')}`);
          }

          fs.writeFileSync(
            'latest.json',
            `${JSON.stringify({
              version,
              notes: process.env.RELEASE_NOTES || `Release ${version}`,
              pub_date: new Date().toISOString(),
              platforms,
            }, null, 2)}\n`,
          );
          NODE
          if gh release view updater -R "$REPO" >/dev/null 2>&1; then
            gh release upload updater latest.json -R "$REPO" --clobber
          else
            gh release create updater -R "$REPO" \
              latest.json \
              --target "$GITHUB_SHA" \
              --title "Updater Manifests" \
              --notes "Auto-maintained by CI. Hosts the updater JSON for STerm." \
              --latest=false
          fi
          # 自动更新读的是固定 updater release 那份；版本 release 若残留旧 latest.json，则删除。
          old_latest_id=$(gh api "/repos/$REPO/releases/tags/$TAG" --jq '.assets[] | select(.name == "latest.json") | .id' || true)
          if [ -n "$old_latest_id" ]; then
            gh api -X DELETE "/repos/$REPO/releases/assets/$old_latest_id" >/dev/null
          fi
